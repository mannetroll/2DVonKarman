[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "turbosim"
version = "0.1.0"
description = "2D decaying turbulence pseudo-spectral solver with a PySide6 GUI"
readme = "README.md"
requires-python = ">=3.13"
authors = [{ name = "turbosim" }]
dependencies = [
    "numpy>=2.0",
    "scipy>=1.13",
    "PySide6>=6.7",
]

[project.optional-dependencies]
# GPU backend (NVIDIA, e.g. RTX 3090). CUDA 12.x wheel; use cupy-cuda11x for
# CUDA 11. Install on a GPU box with:  uv sync --extra gpu
gpu = ["cupy-cuda12x>=13.0"]

[project.scripts]
simulation = "turbosim.app:main"

[dependency-groups]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["turbosim"]
